<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pacifica Crypto Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        h1 { color: #2c3e50; }
        .section { margin-bottom: 2rem; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; }
        #marketsList { list-style-type: none; padding: 0; }
        #marketsList li { padding: 0.5rem 0; border-bottom: 1px solid #eee; }
        #priceDisplay { font-size: 1.5rem; font-weight: bold; color: #27ae60; }
        input, select, button { padding: 0.5rem; margin: 0.2rem; }
    </style>
</head>
<body>
    <h1>Pacifica Crypto Market Info</h1>

    <div class="section">
        <h2>Available Markets</h2>
        <ul id="marketsList">
            <li>Loading markets...</li>
        </ul>
    </div>

    <div class="section">
        <h2>Check Price</h2>
        <label for="symbolSelect">Select Symbol:</label>
        <select id="symbolSelect">
            <option value="">-- choose symbol --</option>
        </select>
        <button id="priceBtn">Get Price</button>
        <div id="priceDisplay">--</div>
    </div>

    <script>
        const apiBase = ''; // same origin as backend

        // Fetch markets and populate list & symbol dropdown
        async function loadMarkets() {
            try {
                const resp = await fetch(`${apiBase}/crypto/markets`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const marketsList = document.getElementById('marketsList');
                const symbolSelect = document.getElementById('symbolSelect');

                // Clear loading text
                marketsList.innerHTML = '';
                symbolSelect.innerHTML = '<option value="">-- choose symbol --</option>';

                // Assuming data is an array of market objects with a 'symbol' field
                if (Array.isArray(data) && data.length) {
                    data.forEach(market => {
                        const sym = market.symbol || market.id || 'UNKNOWN';
                        const li = document.createElement('li');
                        li.textContent = sym;
                        marketsList.appendChild(li);

                        const option = document.createElement('option');
                        option.value = sym;
                        option.textContent = sym;
                        symbolSelect.appendChild(option);
                    });
                } else {
                    marketsList.innerHTML = '<li>No market data available</li>';
                }
            } catch (err) {
                document.getElementById('marketsList').innerHTML = `<li>Error: ${err.message}</li>`;
                console.error(err);
            }
        }

        // Fetch price for selected symbol
        document.getElementById('priceBtn').addEventListener('click', async () => {
            const symbol = document.getElementById('symbolSelect').value.trim();
            const priceDisplay = document.getElementById('priceDisplay');
            if (!symbol) {
                priceDisplay.textContent = 'Please select a symbol';
                priceDisplay.style.color = '#e74c3c';
                return;
            }
            priceDisplay.textContent = 'Loading...';
            priceDisplay.style.color = '#f39c12';
            try {
                const resp = await fetch(`${apiBase}/crypto/price/${encodeURIComponent(symbol.toUpperCase())}`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                // Assuming price is in data.price or data.last or similar
                const price = data.price ?? data.last ?? data.close ?? JSON.stringify(data);
                priceDisplay.textContent = `${symbol.toUpperCase()}: $${price}`;
                priceDisplay.style.color = '#27ae60';
            } catch (err) {
                priceDisplay.textContent = `Error: ${err.message}`;
                priceDisplay.style.color = '#e74c3c';
                console.error(err);
            }
        });

        // Initial load
        loadMarkets();
    </script>
</body>
</html>
